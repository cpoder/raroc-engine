version: "3.8"

services:
  # Main RAROC web app (openraroc.com)
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: raroc-web
    restart: unless-stopped
    ports:
      - "0.0.0.0:8800:8000"
    volumes:
      - ../premium_banks.json:/app/premium_banks.json:ro
    environment:
      - RAROC_PREMIUM_BANKS=/app/premium_banks.json

  # Premium data API (api.openraroc.com)
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: raroc-api
    restart: unless-stopped
    ports:
      - "0.0.0.0:8801:8001"
    volumes:
      - ../premium_banks.json:/app/premium_banks.json:ro
      - api_data:/app/data
    environment:
      - RAROC_ADMIN_KEY=${RAROC_ADMIN_KEY:-change-me-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID:-}
      - WEBAPP_URL=${WEBAPP_URL:-https://openraroc.com}
      - API_URL=${API_URL:-https://api.openraroc.com}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RAROC_DATA_DIR=/app/data

volumes:
  api_data:
